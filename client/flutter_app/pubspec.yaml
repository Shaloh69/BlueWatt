name: bluewatt
description: BlueWatt tenant app — monitor power usage and manage bills.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.2

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # State management
  provider: ^6.1.2

  # Image picking (receipt upload)
  image_picker: ^1.1.2

  # Local push notifications
  flutter_local_notifications: ^17.2.4

  # In-app toast
  toastification: ^2.1.0

  # Charts
  fl_chart: ^0.69.0

  # Cached images (QR codes)
  cached_network_image: ^3.4.1

  # Date / currency formatting
  intl: ^0.19.0

  # Runtime permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
