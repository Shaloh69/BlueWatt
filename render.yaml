services:
  - type: web
    name: bluewatt-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npm run build && npm run migrate:up
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_VERSION
        value: v1
      # Database Configuration (Add your Aiven MySQL details)
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 20011
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: defaultdb
      - key: DB_SSL
        value: "true"
      - key: DB_SSL_CA_B64
        sync: false
      - key: DB_CONNECTION_LIMIT
        value: 10
      # JWT Secrets (Generate secure keys)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      # Supabase Configuration (Add your Supabase details)
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: profile-images
      # API Key Configuration
      - key: API_KEY_PREFIX
        value: bw_
      - key: API_KEY_LENGTH
        value: 32
      # Rate Limiting
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      # CORS Configuration — must match the deployed frontend URL
      - key: CORS_ORIGIN
        value: https://bluewatt-admin.onrender.com
      # Logging
      - key: LOG_LEVEL
        value: info
      - key: LOG_FILE_PATH
        value: /tmp/logs
      # Background Jobs
      - key: ENABLE_AGGREGATION_JOB
        value: "true"
      - key: ENABLE_CLEANUP_JOB
        value: "true"
      # Data Retention
      - key: DETAILED_DATA_RETENTION_DAYS
        value: 30
      - key: AGGREGATED_DATA_RETENTION_DAYS
        value: 365

  - type: web
    name: bluewatt-admin
    runtime: node
    plan: free
    rootDir: client/web_admin
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: NEXT_PUBLIC_API_URL
        value: https://bluewatt-api.onrender.com/api/v1
